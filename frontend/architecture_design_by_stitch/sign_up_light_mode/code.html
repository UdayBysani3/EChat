<body class="bg-background text-on-background min-h-screen flex flex-col items-center justify-center">
<!-- Top AppBar (Simplified for Sign Up) -->
<header class="fixed top-0 z-50 w-full h-16 flex items-center justify-between px-margin-mobile">
<div class="flex items-center gap-2">
<span class="text-primary font-display-lg text-display-lg tracking-tight">EChat</span>
</div>
</header>
<main class="w-full max-w-md px-margin-mobile mt-16 mb-8 flex flex-col items-center">
<!-- Brand/Welcome Section -->
<div class="text-center mb-8">
<h1 class="font-display-lg text-display-lg text-on-surface mb-2">Create Account</h1>
<p class="font-body-base text-secondary">Join the secure communication network.</p>
</div>
<!-- Signup Form Container -->
<div class="w-full bg-surface-container-low p-padding-wide rounded-xl shadow-sm border border-outline-variant/30">
<form class="space-y-gutter" onsubmit="event.preventDefault();">
<!-- Full Name Field -->
<div class="flex flex-col gap-1.5">
<label class="font-label-md text-on-surface-variant px-1" for="full_name">Full Name</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline">person</span>
<input class="w-full pl-10 pr-4 py-3 bg-white border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all font-body-base" id="full_name" placeholder="John Doe" type="text"/>
</div>
</div>
<!-- Email Address Field -->
<div class="flex flex-col gap-1.5">
<label class="font-label-md text-on-surface-variant px-1" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline">mail</span>
<input class="w-full pl-10 pr-4 py-3 bg-white border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all font-body-base" id="email" placeholder="name@example.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-1.5">
<label class="font-label-md text-on-surface-variant px-1" for="password">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline">lock</span>
<input class="w-full pl-10 pr-12 py-3 bg-white border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all font-body-base" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-primary" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<!-- Sign Up Button -->
<button class="w-full bg-primary-container text-on-primary font-title-sm py-4 rounded-lg emerald-glow hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                    Sign Up
                    <span class="material-symbols-outlined">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="flex items-center my-gutter">
<div class="flex-grow border-t border-outline-variant/50"></div>
<span class="px-3 font-label-md text-outline">OR CONTINUE WITH</span>
<div class="flex-grow border-t border-outline-variant/50"></div>
</div>
<!-- Social Logins -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 py-3 bg-white border border-outline-variant rounded-lg hover:bg-surface-variant transition-colors group">
<img alt="Google" class="w-5 h-5" src="https://lh3.googleusercontent.com/aida-public/AB6AXuARQDzxd5yRlBVlmi91BFs_wV-iEIf8ENGRBw9kiSBe1M9snxEZw2wGnH4OEIDHfXMjJpRcFjPWklz6WvYV_QzjH1VimUoBSSA-40cCWkKE891fZ6OwKmHAHewDtXKesxVbXNBpvh1-3kddOwd57mmutqdbOgwFlFOm6ipq8FBipT9VassQm-TQP5nqOKFScTiwafNL7d4gPqQnysPZD1bPmFFAZkvQJz1Ii1zNnKE5umN_Oprb5YwgwlIKzho9ssRpjpuKV7XsukUc"/>

</button>

<span class="font-label-md text-on-surface">Facebook</span>

            Already have an account?

</div>
<!-- Script for micro-interactions -->
<script>
        // Simple input focus effects
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.querySelector('.material-symbols-outlined').style.color = '#00B074';
            });
            input.addEventListener('blur', () => {
                input.parentElement.querySelector('.material-symbols-outlined').style.color = '';
            });
        });

        // Simple button active state feedback
        const primaryBtn = document.querySelector('.bg-primary-container');
        primaryBtn.addEventListener('mousedown', () => primaryBtn.classList.add('scale-95'));
        primaryBtn.addEventListener('mouseup', () => primaryBtn.classList.remove('scale-95'));
        primaryBtn.addEventListener('mouseleave', () => primaryBtn.classList.remove('scale-95'));
    </script>
</body></html>
